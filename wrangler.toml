# Static export → Cloudflare Pages (static output in ./out).
# CF Pages project with Git auto-deploy. Dashboard build command MUST be
# `npx next build` (framework preset: Next.js Static HTML Export), NOT
# next-on-pages. `pages_build_output_dir` below is the source of truth for output.
name = "json-shuttle"
compatibility_date = "2026-01-01"
pages_build_output_dir = "out"
